name: 🚀 Déploiement automatique WAKE

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST_WAKE }}
          username: ${{ secrets.VPS_USER_WAKE }}
          key: ${{ secrets.VPS_SSH_KEY_WAKE }}
          script: |
            cd /var/www/vhosts/belej-erp.com/wake.belej-erp.com
            
            # 🔒 SAUVEGARDE du fichier protégé
            echo "🔒 Sauvegarde du fichier config/config.php..."
            if [ -f config/config.php ]; then
                cp config/config.php /tmp/config.php.backup
            fi
            
            # 📥 Mise à jour du code
            echo "📥 Mise à jour du code..."
            git fetch origin
            git reset --hard origin/main
            
            # ♻️ RESTAURATION du fichier protégé
            echo "♻️ Restauration de config/config.php..."
            if [ -f /tmp/config.php.backup ]; then
                cp /tmp/config.php.backup config/config.php
                echo "✅ Fichier config/config.php préservé !"
            fi
            
            # 🔧 Permissions
            sudo chown -R www-data:www-data .
            sudo find . -type d -exec chmod 755 {} \;
            sudo find . -type f -exec chmod 644 {} \;